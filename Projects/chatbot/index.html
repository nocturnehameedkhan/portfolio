<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="chat-app">
    <div class="chat-header">
      <a href="../../index.html" class="back-btn">←</a>
      <div class="bot-avatar">🤖</div>
      <div class="bot-info"><strong>Alex AI</strong><span class="status">● Online</span></div>
    </div>
    <div class="chat-messages" id="messages">
      <div class="message bot">
        <div class="bubble">Hi! I'm Alex, your AI assistant. Ask me anything — about tech, weather, jokes, or just say hello! 😊</div>
        <div class="time">Just now</div>
      </div>
    </div>
    <div class="chat-input">
      <div class="quick-replies" id="quickReplies">
        <button onclick="sendMessage('Tell me a joke')">😄 Joke</button>
        <button onclick="sendMessage('What can you do?')">❓ Help</button>
        <button onclick="sendMessage('What is JavaScript?')">💻 Tech</button>
      </div>
      <div class="input-row">
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
