<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Spotify Clone</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="spotify-app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">🎵 Spotify</div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active">🏠 Home</a>
        <a href="#" class="nav-item">🔍 Search</a>
        <a href="#" class="nav-item">📚 Your Library</a>
      </nav>
      <div class="playlists">
        <div class="playlists-header">
          <span>Playlists</span><button onclick="alert('Create playlist!')">+</button>
        </div>
        <div class="playlist-list" id="playlistList"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar">
        <a href="../../index.html" class="back-btn">← Portfolio</a>
        <div class="search-bar"><input type="text" placeholder="🔍  Search songs, artists..."/></div>
        <div class="user-badge">👤 Your Profile</div>
      </div>

      <div class="featured">
        <h2>Good Evening 🌙</h2>
        <div class="featured-grid" id="featuredGrid"></div>
      </div>

      <div class="section">
        <h3>Recently Played</h3>
        <div class="song-grid" id="recentGrid"></div>
      </div>

      <div class="section">
        <h3>Top Artists</h3>
        <div class="song-grid" id="artistGrid"></div>
      </div>
    </main>

    <!-- Player -->
    <footer class="player" id="player">
      <div class="player-track">
        <div class="player-art" id="playerArt">🎵</div>
        <div>
          <div class="player-title" id="playerTitle">Select a song</div>
          <div class="player-artist" id="playerArtist">—</div>
        </div>
        <button class="like-btn" id="likeBtn" onclick="toggleLike()">♡</button>
      </div>
      <div class="player-controls">
        <button onclick="prevSong()">⏮</button>
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button onclick="nextSong()">⏭</button>
      </div>
      <div class="player-progress">
        <span id="currentTime">0:00</span>
        <div class="progress-track" onclick="seek(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span id="totalTime">3:30</span>
        <span>🔊</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="70" style="width:80px"/>
      </div>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
